<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram login</title>
    <link rel="import" href="component.html">
    <link rel="stylesheet" href="style.css">

</head>
<body>
      <div class="background-overlay"></div>

  <div class="main-container">
   <div class="image-side">
  <img src="https://i.imgur.com/zjcRZRD.png" alt="Instagram showcase">
</div>

    <div class="login-container">
        <div class="login-box">
            <div class="logo"><I>Instagram</I></div>
            <form >
                <input type="text" placeholder="Phone Number , UserName or Email" required>
                <input type="text" placeholder="Password" required>
                <button type="submit"> Log In</button>
                <div class="divider">OR</div>
                <a href="#" class="fb-login">Log in with facebook</a>
                <a href="#" class="forget-passward">Forget Passward</a>

            </form>
        </div>
        <div class="signup-box"> 
            <p> Don't have an account? <a href="sign-up">Sign up</a></p>
        </div>
    </div>
    </div>
 


    
</body>
</html>
